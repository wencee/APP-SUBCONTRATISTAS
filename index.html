<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carga de Fleteros</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="max-w-lg mx-auto px-4 py-6">
    <!-- Header -->
    <div class="bg-blue-600 rounded-t-2xl px-6 py-5 text-white">
      <h1 class="text-xl font-bold">Carga de Fleteros</h1>
      <p class="text-blue-200 text-sm mt-1">Registro de datos de transporte</p>
    </div>

    <!-- Formulario -->
    <form id="formFletero" class="bg-white rounded-b-2xl shadow-lg px-6 py-5 space-y-4">

      <!-- Fecha de carga -->
      <div>
        <label for="fechaCarga" class="block text-sm font-medium text-gray-700 mb-1">Fecha de carga</label>
        <input type="date" id="fechaCarga" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
      </div>

      <!-- Apellido y Nombre -->
      <div>
        <label for="apellidoNombre" class="block text-sm font-medium text-gray-700 mb-1">Apellido y Nombre</label>
        <input type="text" id="apellidoNombre" placeholder="Ej: González Juan" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
      </div>

      <!-- DNI -->
      <div>
        <label for="dni" class="block text-sm font-medium text-gray-700 mb-1">DNI</label>
        <input type="text" id="dni" inputmode="numeric" pattern="[0-9]*" placeholder="Ej: 30123456" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
      </div>

      <!-- Patente Tractor -->
      <div>
        <label for="patenteTractor" class="block text-sm font-medium text-gray-700 mb-1">Patente Tractor</label>
        <input type="text" id="patenteTractor" placeholder="Ej: AB123CD" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-gray-900 uppercase focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
      </div>

      <!-- Patente Semi -->
      <div>
        <label for="patenteSemi" class="block text-sm font-medium text-gray-700 mb-1">Patente Semi</label>
        <input type="text" id="patenteSemi" placeholder="Ej: XY456ZW" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-gray-900 uppercase focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
      </div>

      <!-- Proveedor -->
      <div>
        <label for="proveedor" class="block text-sm font-medium text-gray-700 mb-1">Proveedor</label>
        <input type="text" id="proveedor" placeholder="Nombre del proveedor" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
      </div>

      <!-- CUIT -->
      <div>
        <label for="cuit" class="block text-sm font-medium text-gray-700 mb-1">CUIT</label>
        <input type="text" id="cuit" inputmode="numeric" placeholder="Ej: 20-30123456-7" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
      </div>

      <!-- Botón enviar -->
      <button type="submit" id="btnEnviar"
        class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 active:bg-blue-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        Enviar datos
      </button>

      <!-- Mensaje de estado -->
      <div id="mensaje" class="hidden rounded-lg px-4 py-3 text-sm text-center"></div>
    </form>
  </div>

  <script>
    // ============================================================
    // PEGAR ACÁ la URL del Google Apps Script desplegado como web app
    // ============================================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwJqsmExTFg7T1x7EnuXHP0ZSpAbbmbK1_gSVo2WF7FoQBmFbucT8L-tS1-M1V16okU/exec';

    // Fecha de hoy como valor default
    document.getElementById('fechaCarga').valueAsDate = new Date();

    // Uppercase automático para patentes
    document.getElementById('patenteTractor').addEventListener('input', function () {
      this.value = this.value.toUpperCase();
    });
    document.getElementById('patenteSemi').addEventListener('input', function () {
      this.value = this.value.toUpperCase();
    });

    // Formateo automático de CUIT (XX-XXXXXXXX-X)
    document.getElementById('cuit').addEventListener('input', function () {
      var nums = this.value.replace(/\D/g, '');
      if (nums.length <= 2) {
        this.value = nums;
      } else if (nums.length <= 10) {
        this.value = nums.slice(0, 2) + '-' + nums.slice(2);
      } else {
        this.value = nums.slice(0, 2) + '-' + nums.slice(2, 10) + '-' + nums.slice(10, 11);
      }
    });

    // Envío del formulario
    document.getElementById('formFletero').addEventListener('submit', function (e) {
      e.preventDefault();

      if (!SCRIPT_URL) {
        mostrarMensaje('Falta configurar la URL del Google Apps Script. Ver instrucciones en google-apps-script.js', 'error');
        return;
      }

      var btn = document.getElementById('btnEnviar');
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      var datos = {
        fechaCarga: document.getElementById('fechaCarga').value,
        dni: document.getElementById('dni').value,
        apellidoNombre: document.getElementById('apellidoNombre').value,
        patenteTractor: document.getElementById('patenteTractor').value,
        patenteSemi: document.getElementById('patenteSemi').value,
        proveedor: document.getElementById('proveedor').value,
        cuit: document.getElementById('cuit').value
      };

      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(datos)
      })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (data.result === 'ok') {
            mostrarMensaje('Datos guardados correctamente', 'ok');
            document.getElementById('formFletero').reset();
            document.getElementById('fechaCarga').valueAsDate = new Date();
          } else {
            mostrarMensaje('Error: ' + (data.message || 'respuesta inesperada'), 'error');
          }
        })
        .catch(function (err) {
          mostrarMensaje('Error de conexión: ' + err.message, 'error');
        })
        .finally(function () {
          btn.disabled = false;
          btn.textContent = 'Enviar datos';
        });
    });

    function mostrarMensaje(texto, tipo) {
      var el = document.getElementById('mensaje');
      el.textContent = texto;
      el.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
      if (tipo === 'ok') {
        el.classList.add('bg-green-100', 'text-green-800');
      } else {
        el.classList.add('bg-red-100', 'text-red-800');
      }
      el.classList.remove('hidden');
      if (tipo === 'ok') {
        setTimeout(function () { el.classList.add('hidden'); }, 4000);
      }
    }
  </script>

</body>
</html>
